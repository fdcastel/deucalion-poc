name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ── Deploy probe worker ──────────────────────────────────────────────
      - name: Deploy probe worker
        working-directory: workers/probe
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ── Apply D1 migration & deploy variant-a ────────────────────────────
      - name: Apply D1 migration
        working-directory: workers/variant-a
        run: pnpm wrangler d1 migrations apply deucalion-poc-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy variant-a worker
        working-directory: workers/variant-a
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ── Deploy variant-b (WAE) ───────────────────────────────────────────
      - name: Set WAE_API_TOKEN secret on variant-b
        working-directory: workers/variant-b
        run: echo "$WAE_API_TOKEN" | pnpm wrangler secret put WAE_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WAE_API_TOKEN: ${{ secrets.WAE_API_TOKEN }}

      - name: Set CF_ACCOUNT_ID secret on variant-b
        working-directory: workers/variant-b
        run: echo "$CF_ACCOUNT_ID" | pnpm wrangler secret put CF_ACCOUNT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy variant-b worker
        working-directory: workers/variant-b
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ── Deploy scheduler ─────────────────────────────────────────────────
      - name: Set PROBE_WORKER_URL secret on scheduler
        working-directory: workers/scheduler
        run: echo "https://deucalion-poc-probe.${{ secrets.CF_ACCOUNT_ID }}.workers.dev" | pnpm wrangler secret put PROBE_WORKER_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set VARIANT_A_URL secret on scheduler
        working-directory: workers/scheduler
        run: echo "https://deucalion-poc-variant-a.${{ secrets.CF_ACCOUNT_ID }}.workers.dev" | pnpm wrangler secret put VARIANT_A_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set VARIANT_B_URL secret on scheduler
        working-directory: workers/scheduler
        run: echo "https://deucalion-poc-variant-b.${{ secrets.CF_ACCOUNT_ID }}.workers.dev" | pnpm wrangler secret put VARIANT_B_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy scheduler worker
        working-directory: workers/scheduler
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ── Smoke tests — Variant A ──────────────────────────────────────────
      - name: Smoke test — variant-a /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://deucalion-poc-variant-a.${{ secrets.CF_ACCOUNT_ID }}.workers.dev/health")
          [ "$STATUS" = "200" ] || (echo "variant-a /health returned $STATUS" && exit 1)

      - name: Smoke test — variant-a /status
        run: |
          BODY=$(curl -sf \
            "https://deucalion-poc-variant-a.${{ secrets.CF_ACCOUNT_ID }}.workers.dev/status")
          echo "$BODY" | grep -q "monitors" || (echo "variant-a /status missing 'monitors' key" && exit 1)

      - name: Smoke test — variant-a /history/cf-web
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://deucalion-poc-variant-a.${{ secrets.CF_ACCOUNT_ID }}.workers.dev/history/cf-web")
          [ "$STATUS" = "200" ] || (echo "variant-a /history/cf-web returned $STATUS" && exit 1)

      # ── Smoke tests — Variant B ──────────────────────────────────────────
      - name: Smoke test — variant-b /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://deucalion-poc-variant-b.${{ secrets.CF_ACCOUNT_ID }}.workers.dev/health")
          [ "$STATUS" = "200" ] || (echo "variant-b /health returned $STATUS" && exit 1)

      - name: Smoke test — variant-b /status
        run: |
          BODY=$(curl -sf \
            "https://deucalion-poc-variant-b.${{ secrets.CF_ACCOUNT_ID }}.workers.dev/status")
          echo "$BODY" | grep -q "monitors" || (echo "variant-b /status missing 'monitors' key" && exit 1)

      - name: Smoke test — variant-b /history/cf-web
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://deucalion-poc-variant-b.${{ secrets.CF_ACCOUNT_ID }}.workers.dev/history/cf-web")
          [ "$STATUS" = "200" ] || (echo "variant-b /history/cf-web returned $STATUS" && exit 1)
