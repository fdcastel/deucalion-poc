name: Placement Sweep

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  WORKERS_SUBDOMAIN: ${{ vars.CF_WORKERS_SUBDOMAIN }}

jobs:
  prepare-matrix:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from placement-hints.json
        id: matrix
        run: |
          MATRIX_JSON=$(jq -c '{include: .}' .github/placement-hints.json)
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  sweep:
    name: Sweep ${{ matrix.iata }}
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CITY: ${{ matrix.city }}
      IATA: ${{ matrix.iata }}
      EXPECTED_COLO: ${{ matrix.expectedColo }}
      HINT_TYPE: ${{ matrix.hintType }}
      HINT_VALUE: ${{ matrix.hintValue }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate wrangler.jsonc from template
        working-directory: workers/probe-placement-test
        run: |
          command -v envsubst >/dev/null || (echo "envsubst is required" && exit 1)
          export IATA_LOWER=$(echo "$IATA" | tr '[:upper:]' '[:lower:]')
          envsubst < wrangler.jsonc.template > wrangler.jsonc
          cat wrangler.jsonc

      - name: Deploy sweep worker
        working-directory: workers/probe-placement-test
        run: pnpm wrangler deploy

      - name: Warm up deployment
        run: sleep 30

      - name: Read placement status (best-effort)
        id: placement_status
        run: |
          IATA_LOWER=$(echo "$IATA" | tr '[:upper:]' '[:lower:]')
          SERVICE_NAME="deucalion-poc-probe-sweep-${IATA_LOWER}"
          STATUS_JSON=$(curl -sf \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/services/${SERVICE_NAME}" \
            || echo '{}')

          PLACEMENT_STATUS=$(echo "$STATUS_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print((((d.get('result') or {}).get('placement') or {}).get('status')) or 'unknown')" 2>/dev/null || echo "unknown")
          echo "placement_status=${PLACEMENT_STATUS}" >> "$GITHUB_OUTPUT"

      - name: Probe /health 10 times
        id: probe
        run: |
          IATA_LOWER=$(echo "$IATA" | tr '[:upper:]' '[:lower:]')
          URL="https://deucalion-poc-probe-sweep-${IATA_LOWER}.${WORKERS_SUBDOMAIN}.workers.dev/health"
          echo "Probing $URL"

          EFFECTIVE_COLOS=()
          INGRESS_COLOS=()
          PLACEMENT_HEADERS=()
          SIGNAL_SOURCES=()
          for _ in $(seq 1 10); do
            HEADERS_FILE=$(mktemp)
            BODY_FILE=$(mktemp)

            curl -sfS -D "$HEADERS_FILE" -o "$BODY_FILE" "$URL"

            INGRESS_COLO=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1], encoding='utf-8')).get('colo','unknown'))" "$BODY_FILE" 2>/dev/null || echo "unknown")
            CF_PLACEMENT=$(grep -i '^cf-placement:' "$HEADERS_FILE" | tail -n1 | cut -d':' -f2- | tr -d '\r' | sed 's/^ *//')
            CF_RAY=$(grep -i '^cf-ray:' "$HEADERS_FILE" | tail -n1 | awk '{print $2}' | tr -d '\r')

            PLACEMENT_COLO=""
            SIGNAL_SOURCE="unknown"
            if [ -n "$CF_PLACEMENT" ]; then
              PLACEMENT_COLO=$(python3 -c "import re,sys; h=sys.argv[1]; m=re.findall(r'[A-Z]{3}', h); print(m[-1] if m else '')" "$CF_PLACEMENT")
              SIGNAL_SOURCE="cf-placement"
            elif [ -n "$CF_RAY" ] && echo "$CF_RAY" | grep -q -- '-'; then
              PLACEMENT_COLO=$(echo "$CF_RAY" | sed 's/.*-//')
              SIGNAL_SOURCE="cf-ray"
            else
              PLACEMENT_COLO="$INGRESS_COLO"
              SIGNAL_SOURCE="request.cf.colo"
            fi

            if [ -z "$PLACEMENT_COLO" ]; then
              PLACEMENT_COLO="unknown"
            fi

            EFFECTIVE_COLOS+=("$PLACEMENT_COLO")
            INGRESS_COLOS+=("$INGRESS_COLO")
            PLACEMENT_HEADERS+=("${CF_PLACEMENT:-none}")
            SIGNAL_SOURCES+=("$SIGNAL_SOURCE")

            rm -f "$HEADERS_FILE" "$BODY_FILE"
            sleep 2
          done

          EFFECTIVE_JSON=$(printf '%s\n' "${EFFECTIVE_COLOS[@]}" | python3 -c "import json,sys; print(json.dumps([l.strip() or 'unknown' for l in sys.stdin]))")
          INGRESS_JSON=$(printf '%s\n' "${INGRESS_COLOS[@]}" | python3 -c "import json,sys; print(json.dumps([l.strip() or 'unknown' for l in sys.stdin]))")
          PLACEMENT_HEADERS_JSON=$(printf '%s\n' "${PLACEMENT_HEADERS[@]}" | python3 -c "import json,sys; print(json.dumps([l.strip() or 'none' for l in sys.stdin]))")
          SIGNAL_SOURCES_JSON=$(printf '%s\n' "${SIGNAL_SOURCES[@]}" | python3 -c "import json,sys; print(json.dumps([l.strip() or 'unknown' for l in sys.stdin]))")

          echo "effective_colos_json=$EFFECTIVE_JSON" >> "$GITHUB_OUTPUT"
          echo "ingress_colos_json=$INGRESS_JSON" >> "$GITHUB_OUTPUT"
          echo "placement_headers_json=$PLACEMENT_HEADERS_JSON" >> "$GITHUB_OUTPUT"
          echo "signal_sources_json=$SIGNAL_SOURCES_JSON" >> "$GITHUB_OUTPUT"

      - name: Write per-city result artifact
        run: |
          mkdir -p out
          cat > out/result.json <<EOF
          {
            "city": "$CITY",
            "iata": "$IATA",
            "expectedColo": "$EXPECTED_COLO",
            "hintType": "$HINT_TYPE",
            "hintValue": "$HINT_VALUE",
            "placementStatus": "${{ steps.placement_status.outputs.placement_status }}",
            "observedPlacementColos": ${{ steps.probe.outputs.effective_colos_json }},
            "observedIngressColos": ${{ steps.probe.outputs.ingress_colos_json }},
            "observedPlacementHeaders": ${{ steps.probe.outputs.placement_headers_json }},
            "signalSources": ${{ steps.probe.outputs.signal_sources_json }}
          }
          EOF

      - name: Upload per-city result
        uses: actions/upload-artifact@v4
        with:
          name: placement-sweep-${{ matrix.iata }}
          path: out/result.json

      - name: Delete sweep worker
        if: always()
        working-directory: workers/probe-placement-test
        run: |
          pnpm wrangler delete --name "deucalion-poc-probe-sweep-$(echo "$IATA" | tr '[:upper:]' '[:lower:]')" --force || true

  aggregate:
    name: Aggregate sweep results
    needs: sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all sweep artifacts
        uses: actions/download-artifact@v4
        with:
          path: sweep-artifacts
          pattern: placement-sweep-*

      - name: Build PLACEMENT_SWEEP_RESULTS.md
        run: |
          find sweep-artifacts -name result.json -print0 | xargs -0 jq -s '.' > all-results.json

          python3 - <<'PY'
          import json
          from collections import Counter

          with open('all-results.json', 'r', encoding='utf-8') as f:
            rows = json.load(f)

          rows = sorted(rows, key=lambda r: r['iata'])

          exact = 0
          partial = 0
          loose = 0
          failure = 0

          brazilian_colos = {r['expectedColo'] for r in rows}

          md = []
          md.append('# Placement Sweep Results')
          md.append('')
          md.append('| City | IATA | Hint | Placement status | Signal quality | Observed placement colos | Observed ingress colos | Exact match | Partial match | Loose match | Consistent | Failure |')
          md.append('|------|------|------|------------------|----------------|---------------------------|----------------------|------------|---------------|-------------|------------|---------|')

          for r in rows:
            observed = r.get('observedPlacementColos') or r.get('observedColos', [])
            ingress = r.get('observedIngressColos', [])
            placement_headers = r.get('observedPlacementHeaders', [])
            signal_sources = r.get('signalSources', [])
            expected = r['expectedColo']
            counts = Counter(observed)
            majority = counts.most_common(1)[0][0] if counts else 'unknown'

            exact_match = len(observed) > 0 and all(c == expected for c in observed)
            partial_match = (not exact_match) and (majority == expected)
            loose_match = any(c in brazilian_colos for c in observed)
            consistent = len(set(observed)) == 1 if observed else False
            only_foreign = len(observed) > 0 and all(c not in brazilian_colos for c in observed)
            # Per Phase 9 criteria: mixed outcomes are considered failures.
            mixed = len(set(observed)) > 1 if observed else False
            is_failure = (len(observed) == 0) or mixed or only_foreign

            if exact_match:
              exact += 1
            elif partial_match:
              partial += 1
            elif loose_match:
              loose += 1
            if is_failure:
              failure += 1

            hint = f"{r['hintType']}={r['hintValue']}"
            obs = ', '.join(observed) if observed else '(none)'
            ingress_obs = ', '.join(ingress) if ingress else '(none)'
            placement_seen = sum(1 for h in placement_headers if h and h != 'none')
            preferred_source = Counter(signal_sources).most_common(1)[0][0] if signal_sources else 'unknown'
            signal_quality = f"cf-placement {placement_seen}/10; source={preferred_source}"
            md.append(
              f"| {r['city']} | {r['iata']} | `{hint}` | `{r.get('placementStatus', 'unknown')}` | {signal_quality} | `{obs}` | `{ingress_obs}` | {'✅' if exact_match else '❌'} | {'✅' if partial_match else '❌'} | {'✅' if loose_match else '❌'} | {'✅' if consistent else '❌'} | {'✅' if is_failure else '❌'} |"
            )
            if only_foreign:
              md.append(f"|  |  |  |  | _Note: observed only non-Brazilian colos_ |  |  |  |  |  |  |  |")
            elif mixed:
              md.append(f"|  |  |  |  | _Note: mixed observed placement colos_ |  |  |  |  |  |  |  |")

          total = len(rows)
          md.append('')
          md.append('## Aggregate pass rates')
          md.append('')
          md.append(f'- Total cities tested: {total}')
          md.append(f'- Exact match pass rate: {exact}/{total} ({(100.0 * exact / total):.1f}%)')
          md.append(f'- Partial match pass rate: {partial}/{total} ({(100.0 * partial / total):.1f}%)')
          md.append(f'- Loose match pass rate: {loose}/{total} ({(100.0 * loose / total):.1f}%)')
          md.append(f'- Failures: {failure}/{total} ({(100.0 * failure / total):.1f}%)')
          md.append('')
          md.append('## Criteria')
          md.append('- Exact match: all 10 observed colos equal expected IATA.')
          md.append('- Partial match: majority colo equals expected IATA.')
          md.append('- Loose match: at least one observed colo is a known Brazilian PoP IATA, even if not the expected city.')
          md.append('- Failure: non-Brazilian only, empty observations, or mixed observed placement colos.')
          md.append('- Signal quality: reports how many of the 10 samples had a cf-placement header and which source was used to derive placement colo.')

          with open('PLACEMENT_SWEEP_RESULTS.md', 'w', encoding='utf-8') as f:
            f.write('\n'.join(md) + '\n')
          PY

      - name: Commit PLACEMENT_SWEEP_RESULTS.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PLACEMENT_SWEEP_RESULTS.md
          git commit -m "chore: update placement sweep results" || echo "No changes to commit"
          git push
